name: build-latex
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reference implementation: xu-cheng/latex-action
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: manuscript/main.tex
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-pdf
          path: manuscript/main.pdf

